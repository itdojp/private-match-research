security:
  security_model: Client-side HMAC/AES-GCM preprocessing plus AWS Clean Rooms collaboration and application governance
  cryptographic_assumptions:
  - HMAC for fingerprint columns
  - AES-GCM for sealed columns
  - Shared-secret generation/storage and client runtime
  - AWS Clean Rooms query/control behavior
  trusted_components:
  - Each C3R client environment
  - Shared-secret custodians and schema
  - AWS Clean Rooms service and configured collaboration/analysis controls
  - Result recipient and decryption environment
  collusion_threshold: Workflow-specific; parties sharing keys or result access can change disclosure boundary
  input_authenticity: Client preprocessing does not prove that a complete or truthful dataset was encrypted
  omission_resistance: Not supplied; rows can be omitted before preprocessing
  replay_and_session_binding: Collaboration ID participates in processing, but Private Match session/replay/query-budget semantics
    are not established
  metadata_leakage:
  - Table shape and row counts
  - Column names/types, value lengths, schema, query/logging information, traffic and result sizes
  - Permitted query outputs
  repeated_query_risk:
  - Repeated SQL analyses can accumulate disclosure
  - Analysis controls must bound permitted templates and outputs
  known_attacks_or_limitations:
  - Repository warns Spark RPC/temporary data can expose secrets without separate Spark controls
  - Client disk and runtime remain responsible for raw data and shared secret
  - Not arbitrary encrypted SQL and not a standalone PSI result policy
