  artifact_size_profile: Input/output tables, schema, encrypted columns, shared secret, query results, logs, temporary files,
    and JARs
  operational_complexity: AWS collaboration setup, party agreement, schema/key distribution, endpoint hardening, analysis
    controls, query approval, and result decryption
  key_or_setup_requirements:
