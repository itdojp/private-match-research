security:
  security_model: Paper describes DDH-based private matching constructions; exact corruption model for each current repository
    binary requires protocol-specific review
  cryptographic_assumptions:
  - Decisional Diffie-Hellman style assumptions described by the cited paper
  - Protocol-specific encryption, shuffling, sharing, randomness, and transport dependencies
  trusted_components:
  - Pinned Rust implementation and dependencies
  - Chosen protocol roles and any helper/shuffler
  - Transport/TLS configuration and downstream MPC
  collusion_threshold: Protocol-specific; delegated and multi-party variants introduce different helper and party assumptions
  input_authenticity: No real-dataset authenticity conclusion was established from the reviewed public workflow
  omission_resistance: No general completeness guarantee; streaming and updates are functionality goals rather than authenticity
    evidence
  replay_and_session_binding: Application/session replay policy was not established from the reviewed README examples
  metadata_leakage:
  - Party roles, endpoints, input sizes, match/UID/share dimensions, timing, and traffic shape
  - Each party's mapping between its own rows and pseudorandom identifiers
  repeated_query_risk:
  - Repeated UID generation or matching may accumulate linkability
  - Streaming or related batches require output and purpose review
  known_attacks_or_limitations:
  - Output semantics differ across binaries
  - No local transport, tamper, replay, side-channel, or implementation audit result exists
  - Nightly Rust requirement in README may affect reproducibility
