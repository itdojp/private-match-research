problem_fit:
  supported_results:
  - intersection
  party_model:
  - two-party
  data_profiles:
  - balanced
  - unbalanced
  - low-entropy-identifiers
  - large-set
  target_use_cases:
  - Two-party synthetic set intersection reproduction
  - Balanced and unbalanced cost comparison
  - Result-recipient and output-policy observation
  non_fit:
  - Selected KKRT path assumes semi-honest participants
  - Upstream output can contain intersection rows rather than only MATCH, NO_MATCH, or INDETERMINATE
  - Does not establish dataset completeness or application query-budget state
security:
  security_model: Selected KKRT path is documented as semi-honest; other repository protocols must be assessed separately
  cryptographic_assumptions:
  - OT-based KKRT PSI assumptions described by the linked protocol documentation and paper
  - Configured OPRF, hash, randomness, and transport dependencies
  trusted_components:
  - Both parties follow the selected semi-honest protocol
  - Pinned SecretFlow PSI source and transitive dependencies
  - Build toolchain, operating systems, input/output boundaries, and transport configuration
  collusion_threshold: Two-party semi-honest experiment; no independent party remains if one endpoint colludes with its operator
  input_authenticity: Not supplied by PSI; the harness can validate syntax and digests but not whether a party supplied its
    real dataset
  omission_resistance: Not supplied; either party can omit otherwise valid rows before the protocol
  replay_and_session_binding: No Private Match session, party, policy, protocol-version, or authoritative replay state was
    established from the reviewed upstream quick start
  metadata_leakage:
  - Party roles and endpoints
  - Input and output file sizes, set sizes, traffic volume, packet timing, and traces
  - Intersection rows at configured result recipients
  repeated_query_risk:
  - Authorized receiver queries can test guessed low-entropy identifiers
  - Related runs can reveal differences unless an application enforces query budgets and purpose binding
  known_attacks_or_limitations:
  - Semi-honest behavior does not cover arbitrary protocol deviation
  - Upstream privileged-container example increases benchmark-host exposure
  - No claim is made for endpoint, side-channel, traffic-analysis, or dataset-quality protection
engineering:
  languages:
  - C++
  - Python for tooling/config generation
  platforms:
  - Linux
  - Bazel
  - Docker path documented upstream
  deployment_models:
  - Two local processes
  - Two containers or hosts connected by configured endpoints
  computation_profile: Protocol and set-size dependent; no local timing result exists
  communication_profile: KKRT is documented as faster with higher communication than ECDH in the upstream protocol guide;
    local bytes are not measured
  artifact_size_profile: Inputs, per-party outputs, traces, configs, logs, build tree, and capture artifacts; local sizes
    unknown
  operational_complexity: Bazel build, native dependencies, two coordinated roles, explicit protocol/result configuration,
    storage mounts, capture, and cleanup
  key_or_setup_requirements:
  - Pinned source and dependency graph
  - Two role configs and network endpoints
  - Synthetic inputs and output paths
  - Explicit broadcast_result and normalization policy
