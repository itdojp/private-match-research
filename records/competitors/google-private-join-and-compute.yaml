privacy_and_security:
  published_technologies:
  - Private intersection-sum
  - Commutative encryption
  - Paillier-style additive homomorphic encryption
  trust_model: Repository documentation describes an honest-but-curious two-party model for the implementation.
  attacker_model: Malicious input authentication and broader endpoint compromise are not solved by the sample implementation.
  raw_data_access: The client learns intersection size and sum rather than the individual matching identifiers in the documented
    mode.
  metadata_leakage:
  - Input-size and transport metadata
  - Small-intersection and repeated-execution risks documented by the project
  repeated_query_controls: Application responsibility; not implemented as a product policy layer.
  minimum_aggregation_controls: Application responsibility.
  audit_and_assurance:
  - Apache-2.0 repository, source, and tests are public; no external audit was identified in the reviewed README.
  - 'Evidence reviewed: public source repository; the implementation was not benchmarked for this record.'
assessment:
  strengths:
  - Output includes count and sum without returning matching identities
  - Public source can support experiments
  limitations_or_unknowns:
  - Not an officially supported Google product
  - Operational controls and malicious-input defenses require additional engineering
  - No public commercial support or pricing
  implications_for_private_match:
  - It is a concrete protocol-bake-off baseline
  - Private Match must add session, policy, evidence, and lifecycle layers
  claim_types:
    facts:
    - The repository implements private intersection cardinality and associated-value sum for two input files.
    - The repository is Apache-2.0 and uses Bazel for its documented build.
    inferences:
    - The code is a building block rather than a deployable product workflow.
    hypotheses:
    - A constrained Private Match count or band mode can reuse lessons from this implementation while adding stronger misuse
      controls.
