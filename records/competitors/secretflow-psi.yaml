privacy_and_security:
  published_technologies:
  - Multiple PSI protocols
  - Private information retrieval
  - CSV and transport APIs
  trust_model: Protocol dependent; the library exposes multiple roles and configurations rather than one universal trust model.
  attacker_model: Protocol dependent and requires evaluation against selected implementation and parameters.
  raw_data_access: Output disclosure depends on the selected protocol and broadcast-result configuration.
  metadata_leakage:
  - Protocol and network metadata
  - Dataset-size and output-path behavior are configuration dependent
  repeated_query_controls: Application responsibility.
  minimum_aggregation_controls: Protocol and application dependent.
  audit_and_assurance:
  - Apache-2.0 repository, CI badge, and public documentation are available; no benchmark was run for this record.
  - 'Evidence reviewed: public source repository; the implementation was not benchmarked for this record.'
assessment:
  strengths:
  - Broad protocol coverage
  - Provides release containers and concrete two-party configuration examples
  limitations_or_unknowns:
  - Large selection surface increases evaluation work
  - Application policy and buyer workflow are out of scope
  - Security properties vary by protocol
  implications_for_private_match:
  - It is a candidate technology-bake-off framework
  - Private Match must pin one protocol profile and conformance behavior
  claim_types:
    facts:
    - The SecretFlow repository contains PSI and PIR implementations and documents a v2 PSI API.
    - The quick start uses separate sender and receiver configurations and release containers.
    inferences:
    - The library is suited to engineering experiments rather than direct end-user procurement.
    hypotheses:
    - A pinned SecretFlow protocol can be a performance comparator if its threat model matches the selected Private Match
      profile.
