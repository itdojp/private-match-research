assessment:
  strengths:
  - Fits existing professional-services intake and clearance
  - Can remove the need for bilateral computation when one firm's internal data is sufficient
  limitations_or_unknowns:
  - Public price is unknown
  - Requires disclosure into an internal conflict process
  - Does not solve cross-organization hidden-set comparison by itself
  implications_for_private_match:
  - Private Match may not be needed when internal conflict data and ordinary intake are sufficient
  - H1 must show a pre-disclosure gap not covered by firm systems
  claim_types:
    facts:
    - Intapp markets Conflicts for new-business acceptance and risk workflows in legal and professional services.
    - The product page describes optional handoff to compliance for clearance.
    inferences:
    - An established internal conflict system is a non-PET substitute for many H1 cases.
    hypotheses:
    - Private Match is useful only when material counterpart data remains outside the firm's authorized conflict database.
