name: Research Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12.13'
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt
      - name: Install integrity-locked build backend
        run: python -m pip install --require-hashes -r requirements-build.txt
      - name: Install integrity-locked validation dependencies
        run: >-
          python -m pip install
          --require-hashes
          --no-build-isolation
          -r requirements-dev.txt
      - name: Run validator tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Validate research records and documentation without network observation
        run: >-
          python scripts/validate_research.py
          --root .
          --report-dir artifacts
          --stale-policy warn
      - name: Validate REUSE licensing metadata
        run: reuse lint
      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: research-quality-report
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
