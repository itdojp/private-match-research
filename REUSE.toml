version = 1
SPDX-PackageName = "private-match-research"
SPDX-PackageSupplier = "ITDO Inc. / 株式会社アイティードゥ"

[[annotations]]
path = [
  ".github/workflows/*.yml",
  ".gitignore",
  "benchmarks/*.json",
  "benchmarks/*.py",
  "benchmarks/*.yaml",
  "benchmarks/fixtures/*.csv",
  "REUSE.toml",
  "requirements-build.in",
  "requirements-build.txt",
  "requirements-dev.in",
  "requirements-dev.txt",
  "schema/*.json",
  "scripts/*.py",
  "tests/*.py",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 ITDO Inc. / 株式会社アイティードゥ"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
  "AGENTS.md",
  "benchmarks/*.md",
  "CONTRIBUTING.md",
  "decisions/*.md",
  "GOVERNANCE.md",
  "LICENSE.md",
  "README.md",
  "ROADMAP.md",
  "docs/*.md",
  "docs/decisions/*.md",
  "landscape/*.md",
  "landscape/substitutes/*.md",
  "templates/*.yaml",
  "technologies/*.md",
  "records/**/*.yaml",
  "records/**/*.yml",
]
